name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "output/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"
          az webapp deploy \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group carlooking-rg \
            --src-path deploy.zip \
            --type zip \
            --async false
